<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理系统</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==================== 登录视图 ==================== -->
  <div id="loginView" class="login-view">
    <div class="login-card">
      <h2>用户登录</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginUsername">用户名</label>
          <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="off" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" placeholder="请输入密码" required />
        </div>
        <div id="loginError" class="login-error"></div>
        <button type="submit" id="loginBtn">登 录</button>
      </form>
    </div>
  </div>

  <!-- ==================== 主视图 ==================== -->
  <div id="mainView" class="main-view" style="display:none;">

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">管理系统</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <a class="nav-item active" data-module="user">
          <span class="nav-icon">&#x1f465;</span>
          <span class="nav-label">用户管理</span>
        </a>
        <a class="nav-item disabled">
          <span class="nav-icon">&#x1f4e6;</span>
          <span class="nav-label">模块二</span>
          <span class="nav-badge">待开发</span>
        </a>
        <a class="nav-item disabled">
          <span class="nav-icon">&#x1f4ca;</span>
          <span class="nav-label">模块三</span>
          <span class="nav-badge">待开发</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <span class="sidebar-user" id="currentUser"></span>
        <button class="btn btn-outline btn-sm" id="logoutBtn">退出登录</button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <div class="main-area">
      <!-- 顶栏 -->
      <header class="topbar">
        <h2 class="topbar-title" id="moduleTitle">用户管理</h2>
      </header>

      <!-- 内容面板 -->
      <div class="content-panel active" id="panel-user">
        <div class="content">
          <!-- 工具栏 -->
          <div class="toolbar">
            <div class="toolbar-left">
              <input type="text" id="searchInput" class="search-input" placeholder="搜索用户名..." />
              <button class="btn btn-primary" id="searchBtn">搜索</button>
              <button class="btn btn-outline" id="resetSearchBtn">重置</button>
            </div>
            <div class="toolbar-right">
              <button class="btn btn-primary" id="addUserBtn">+ 新增用户</button>
            </div>
          </div>

          <!-- 表格容器 -->
          <div class="table-wrapper">
            <table class="data-table" id="userTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>用户名</th>
                  <th>角色</th>
                  <th>用户类型</th>
                  <th>级别</th>
                  <th>部门</th>
                  <th>职位</th>
                  <th>手机号</th>
                  <th>邮箱</th>
                  <th>状态</th>
                  <th>有效期至</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr><td colspan="12" class="table-empty">加载中...</td></tr>
              </tbody>
            </table>
          </div>

          <!-- 分页 -->
          <div class="pagination" id="pagination">
            <button class="btn btn-outline btn-sm" id="prevPageBtn">上一页</button>
            <span class="page-info" id="pageInfo">第 1 页 / 共 1 页（共 0 条）</span>
            <button class="btn btn-outline btn-sm" id="nextPageBtn">下一页</button>
            <span class="page-size-selector">
              每页
              <select id="pageSizeSelect">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="50">50</option>
              </select>
              条
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== 新增/编辑 弹窗 ==================== -->
  <div id="userModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">新增用户</h3>
        <button class="modal-close" id="closeModalBtn">&times;</button>
      </div>
      <div class="modal-body">
        <form id="userForm">
          <input type="hidden" id="formUserId" />
          <div class="form-row">
            <div class="form-group">
              <label for="formUsername">用户名 <span class="required">*</span></label>
              <input type="text" id="formUsername" placeholder="请输入用户名" required />
            </div>
            <div class="form-group">
              <label for="formPassword">密码 <span class="required" id="passwordRequired">*</span></label>
              <input type="password" id="formPassword" placeholder="请输入密码" />
              <span class="form-hint" id="passwordHint" style="display:none;">留空则不修改密码</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="formRole">角色</label>
              <select id="formRole">
                <option value="user">user</option>
                <option value="admin">admin</option>
              </select>
            </div>
            <div class="form-group">
              <label for="formUserType">用户类型</label>
              <select id="formUserType">
                <option value="普通用户">普通用户</option>
                <option value="VIP用户">VIP用户</option>
                <option value="系统用户">系统用户</option>
              </select>
            </div>
            <div class="form-group">
              <label for="formUserLevel">用户级别</label>
              <input type="number" id="formUserLevel" placeholder="级别" min="0" max="99" value="1" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="formDepartment">部门</label>
              <input type="text" id="formDepartment" placeholder="请输入部门" />
            </div>
            <div class="form-group">
              <label for="formPosition">职位</label>
              <input type="text" id="formPosition" placeholder="请输入职位" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="formPhone">手机号</label>
              <input type="text" id="formPhone" placeholder="请输入手机号" />
            </div>
            <div class="form-group">
              <label for="formEmail">邮箱</label>
              <input type="email" id="formEmail" placeholder="请输入邮箱" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="formIsEnabled">是否启用</label>
              <select id="formIsEnabled">
                <option value="1">启用</option>
                <option value="0">禁用</option>
              </select>
            </div>
            <div class="form-group">
              <label for="formValidUntil">有效期至</label>
              <input type="date" id="formValidUntil" />
            </div>
          </div>
        </form>
        <div id="formError" class="form-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelModalBtn">取消</button>
        <button class="btn btn-primary" id="saveUserBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- ==================== 删除确认弹窗 ==================== -->
  <div id="deleteModal" class="modal-overlay" style="display:none;">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>确认删除</h3>
        <button class="modal-close" id="closeDeleteModalBtn">&times;</button>
      </div>
      <div class="modal-body">
        <p>确定要删除用户 <strong id="deleteUsername"></strong> 吗？此操作不可撤销。</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelDeleteBtn">取消</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
      </div>
    </div>
  </div>

  <!-- ==================== Toast 消息 ==================== -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
