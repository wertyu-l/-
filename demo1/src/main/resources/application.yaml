server:
  port: 8085

spring:
  application:
    name: demo1

  datasource:
    url: jdbc:h2:file:./data/demodb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.demo.ST